<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandora Control</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #fff; font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .nav-item { padding: 10px 14px; border-radius: 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #666; transition: all .15s; margin-bottom: 2px; }
  .nav-item:hover { background: #1a1a2e; color: #aaa; }
  .nav-item.active { background: #7c3aed25; color: #c4b5fd; font-weight: 600; }
  .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #333; padding: 14px 14px 6px; }
  .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; margin: 3px; }
  .agenda-item { display: flex; gap: 14px; align-items: flex-start; padding: 12px 14px; background: #0d0d15; border-radius: 10px; border-left: 3px solid #333; margin-bottom: 8px; }
  .agenda-item.now { border-left-color: #10b981; background: #10b98108; }
  .agenda-item.soon { border-left-color: #f59e0b; }
  .email-row { padding: 10px 0; border-bottom: 1px solid #1a1a2e; }
  .email-row:last-child { border-bottom: none; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 4px; }
  .todo-item:hover { background: #1a1a2e; }
  .checkbox { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #333; flex-shrink: 0; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .checkbox.done { background: #10b981; border-color: #10b981; }
  .lead-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1a1a2e; }
  .lead-item:last-child { border-bottom: none; }
  .lead-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,#7c3aed60,#4f46e560); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .metric-card { background: #0d0d15; border: 1px solid #1a1a2e; border-radius: 12px; padding: 16px; text-align: center; }
  .metric-val { font-size: 32px; font-weight: 700; }
  .metric-label { font-size: 11px; color: #666; text-transform: uppercase; margin-top: 4px; }
  .metric-sub { font-size: 12px; margin-top: 6px; }
  .section-header { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .section-desc { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.6; }
  .alert-card { padding: 14px 16px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid; }
  .alert-red { background: #ef444410; border-color: #ef4444; }
  .alert-yellow { background: #f59e0b10; border-color: #f59e0b; }
  .alert-green { background: #10b98110; border-color: #10b981; }
</style>
</head>

  {id:9, text:'YouTube 2 canais conectados ✅', tag:'Feito', tc:'#10b981', tb:'#10b98120', done:true},

function toggleTodo(id) {
  const t = todos.find(x=>x.id===id); if(t) { t.done=!t.done; showSection('dashboard', null, true); }
}
function addTodo() {
  const text = prompt('Nova tarefa:');

function showSection(name, el, silent) {
  if (!silent) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (el) el.classList.add('active');
  }
  const content = sections[name];
  document.getElementById('main').innerHTML = content ? content() : `<div class="section-header">${name}</div><div class="section-desc">Em breve.</div>`;
}
